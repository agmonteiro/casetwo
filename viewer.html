<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Casetwo API Viewer</title>
</head>
<body>

    <h1>Casetwo Product Catalog</h1>

    <button onclick="loadProducts()">
        Load Products
    </button>

    <div id="products"></div>

    <script>
        async function loadProducts() {
            try {
                const response =
                    await fetch(
                        "http://127.0.0.1:8000/products"
                    );

                const products =
                    await response.json();

                const container =
                    document.getElementById(
                        "products"
                    );

                container.innerHTML = "";

                for (const product of products) {

                    const imageUrl =
                        "http://127.0.0.1:8000/" +
                        product.image
                            .replaceAll("\\", "/")
                            .replace("app/", "");

                    container.innerHTML += `
                        <h2>${product.name}</h2>

                        <p>
                            Category:
                            ${product.category}
                        </p>

                        <p>
                            Price:
                            ${product.price}
                        </p>

                        <img
                            src="${imageUrl}"
                            alt="${product.name}"
                            width="200"
                        >

                        <hr>
                    `;
                }
            }
            catch (error) {
                alert(
                    "Could not connect to API."
                );

                console.error(error);
            }
        }
    </script>

</body>
</html>
